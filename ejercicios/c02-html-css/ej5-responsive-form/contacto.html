</head>
<body>
    <header>
        <h1>Contacto</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Enviame un mensaje</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label> <input type="text" id="nombre" name="nombre" placeholder="Escribí tu nombre" required> </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required> </div>

                <div class="form-group">
                    <label for="asunto">Asunto:</label>
                    <input type="text" id="asunto" name="asunto" minlength="6" placeholder="Mínimo 6 caracteres" required> </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué puedo ayudarte?"></textarea> </div>

                <button type="submit">Enviar Formulario</button> </form>
        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
