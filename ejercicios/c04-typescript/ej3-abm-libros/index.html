<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - ABM de Libros</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        form { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .campo { margin-bottom: 10px; }
        label { display: block; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        #errorForm { color: white; background: #d9534f; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: none; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #eee; margin-bottom: 5px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-eliminar { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-agregar { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Gestión de Catálogo (ABM)</h1>

    <div id="errorForm"></div>

    <form id="formularioLibro">
        <div class="campo">
            <label>Título:</label>
            <input type="text" id="titulo">
        </div>
        <div class="campo">
            <label>Autor:</label>
            <input type="text" id="autor">
        </div>
        <div class="campo">
            <label>Precio:</label>
            <input type="number" id="precio">
        </div>
        <div class="campo">
            <label>
                <input type="checkbox" id="disponible" checked style="width: auto;"> ¿Está disponible?
            </label>
        </div>
        <button type="button" id="btnAgregar" class="btn-agregar">Agregar Libro</button>
    </form>

    <ul id="listado"></ul>
    <p id="stats"></p>

    <script src="app.js"></script>
</body>
</html>
