<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 5 - DOM</title>
    <style>
        /* Un poco de estilo para que el error se vea rojo */
        #error { color: red; font-weight: bold; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Generador de Árbol de Asteriscos</h1>
    
    <label for="altura">Altura del árbol:</label>
    <input type="number" id="altura" placeholder="Ej: 5">
    <button id="btnGenerar">Generar</button>

    <p id="error"></p>

    <pre id="resultado"></pre>

    <script src="app.js"></script>
</body>
</html>
